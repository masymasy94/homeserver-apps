networks:
  apps-infra:
    name: apps-infra

services:
  # === Docker Registry (local image cache) ===
  registry:
    image: registry:2
    container_name: apps-registry
    restart: unless-stopped
    networks:
      - apps-infra
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry

  # === Self-Hosted GitHub Actions Runner ===
  # 1. Create infrastructure/secrets/access_token with your GitHub PAT
  # 2. Set REPO_URL in infrastructure/.env
  # 3. Start: docker compose -f infrastructure/docker-compose.yml --profile runner up -d
  runner:
    build:
      context: .
      dockerfile: runner.Dockerfile
    image: apps-github-runner:latest
    container_name: apps-github-runner
    restart: unless-stopped
    networks:
      - apps-infra
    environment:
      - RUNNER_NAME=homeserver-runner
      - RUNNER_WORKDIR=/tmp/runner/work
      - RUNNER_SCOPE=repo
      - REPO_URL=${REPO_URL:-}
      - LABELS=self-hosted,linux,homeserver
      - DISABLE_AUTO_UPDATE=true
      - PATH=${HOME}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    secrets:
      - access_token
    volumes:
      # Docker socket — so runner can manage containers on the host
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-work:/tmp/runner/work
      # Mount apps dir at SAME host path — critical for docker compose
      # build contexts and file paths to resolve correctly on the host daemon
      - /home/masy/Desktop/docker/apps:/home/masy/Desktop/docker/apps
      # yq binary
      - ${HOME}/bin:${HOME}/bin:ro
    profiles:
      - runner

secrets:
  access_token:
    file: ./secrets/access_token

volumes:
  registry-data:
  runner-work:
